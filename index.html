  <body>
    <header class="header wrapper">
      <picture class="header__background fullbleed">
        <source

          height="1640"

          srcset="/src/assets/homepage/hero-bg-desktop@2x.jpg"
        />

        <source
          width="1536"
          height="1984"
          media="(width >= 48.75rem)"
          srcset="/src/assets/homepage/hero-bg-tablet@2x.jpg"
        />

        <img
          width="750"
          height="1496"
          src="/src/assets/homepage/hero-bg-mobile@2x.jpg"
          alt="A plate of spaghetti pasta with shrimp"
        />
      </picture>
      <a href="/" class="header__home-link"
        ><img
          class="header__home-logo"
          width="103"
          height="40"
          src="/src/assets/homepage/dine-logo@1x.png"
          srcset="
            /src/assets/homepage/dine-logo@2x.png 2x,
            /src/assets/homepage/dine-logo@3x.png 3x
          "
          alt="Dine Home Page"
          class="header__icon-logo"
      /></a>
    </header>

    <main>
      <section class="hero-cta wrapper">
        <div class="hero-cta__wrapper">
          <div class="hero-cta__text">
            <h1 class="hero-cta__title">Exquisite dining since 1989</h1>
            <p class="hero-cta__description">
              Experience our seasonal menu in beautiful country surroundings.
              Eat the freshest produce from the comfort of our farmhouse.
            </p>
          </div>

          <a class="hero-cta__button-link button" href="/booking.html"
            >book a table</a
          >
        </div>
      </section>
    </main>
